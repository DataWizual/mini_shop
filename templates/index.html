<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mini Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container py-5">
    <h1 class="mb-4">🛒 Mini Shop</h1>

    <form action="/add" method="POST" class="mb-4">
        <div class="input-group">
            <input type="text" name="name" placeholder="Product name" class="form-control" required>
            <input type="number" step="0.01" name="price" placeholder="Price" class="form-control" required>
            <button type="submit" class="btn btn-primary">Add</button>
        </div>
    </form>

    <h3>Products:</h3>
    <ul class="list-group">
        {% for product in products %}
            <li class="list-group-item">
                {{ product.name }} — ${{ product.price }}
            </li>
        {% else %}
            <li class="list-group-item text-muted">No products yet</li>
        {% endfor %}
    </ul>
</body>
</html>
