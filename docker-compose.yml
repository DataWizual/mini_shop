version: "3.9"

services:
  shop:
    build: .
    container_name: mini_shop_backend
    ports:
      - "8080:5000"
    restart: always
    volumes:
      - .:/app
    environment:
      - FLASK_ENV=production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 10s
      timeout: 5s
      retries: 3

  nginx:
    image: eldordevops/mini_shop:latest
    container_name: mini_shop_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - shop
