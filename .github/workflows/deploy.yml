name: CI/CD Pipeline

on:
  push:
    branches:
      - main # Запускаем только при пуше в ветку main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Клонируем репозиторий
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Логинимся в DockerHub
      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 3. Собираем и пушим Docker-образ
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: eldordevops/mini_shop:latest,eldordevops/mini_shop:${{ github.sha }}

      # 4. Подключаемся к серверу по SSH и деплоим
      - name: Deploy to server
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          script: |
            cd /home/deploy/mini_shop
            # создаём/обновляем .env
            echo "${{ secrets.DEPLOY_ENV }}" > .env
            # тянем свежий образ
            docker compose pull
            # пересобираем и перезапускаем контейнеры
            docker compose up -d --force-recreate
